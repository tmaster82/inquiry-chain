<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탐구 SET 워크북 · 일상에서 시작하는 탐구</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --navy:#1F2C4E; --navy2:#2E4A7A; --blue:#3B79C3; --orange:#E8762D;
  --paper:#F5F7FA; --card:#FFFFFF; --ink:#1A2233; --sub:#5A6478;
  --line:#DDE3EC; --ok:#2E8B57; --serif:'Batang','바탕',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Pretendard,-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;font-size:14px}

/* ---------- header ---------- */
header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;
  align-items:center;gap:14px;flex-wrap:wrap;border-bottom:4px solid var(--orange)}
header h1{font-size:19px;font-weight:800;letter-spacing:-.02em}
header h1 span{color:var(--orange)}
header .sub{font-size:12px;opacity:.75}
header .spacer{flex:1}
.hbtn{background:rgba(255,255,255,.12);color:#fff;padding:7px 13px;border-radius:8px;font-weight:600}
.hbtn:hover{background:rgba(255,255,255,.24)}

/* ---------- layout ---------- */
.wrap{max-width:1060px;margin:0 auto;padding:22px 18px 80px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:20px 22px;margin-bottom:18px}
h2{font-size:17px;font-weight:800;margin-bottom:4px;letter-spacing:-.02em}
h3{font-size:14.5px;font-weight:700;margin:16px 0 6px}
.hint{font-size:13px;color:var(--sub);margin-bottom:12px}
.hint b{color:var(--orange)}
label{display:block;font-size:13px;font-weight:700;margin:12px 0 4px}
label small{font-weight:400;color:var(--sub)}
input[type=text],textarea,select{width:100%;border:1.5px solid var(--line);border-radius:9px;
  padding:9px 12px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink)}
textarea{min-height:74px;resize:vertical}
input:focus,textarea:focus,select:focus{outline:2px solid var(--blue);outline-offset:1px;border-color:var(--blue)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
@media(max-width:640px){.row2{grid-template-columns:1fr}}

/* ---------- home ---------- */
.home-hero{background:var(--navy);color:#fff;border-radius:14px;padding:26px 26px;margin-bottom:18px}
.home-hero .eyebrow{font-size:12px;letter-spacing:.14em;color:var(--orange);font-weight:700}
.home-hero h2{font-size:24px;color:#fff;margin:6px 0 8px}
.home-hero p{font-size:13.5px;opacity:.85;max-width:640px}
.chain{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:8px 2px 14px}
.chain-node{min-width:210px;background:var(--card);border:1.5px solid var(--line);
  border-radius:12px;padding:14px 16px;position:relative;flex-shrink:0}
.chain-node .n{font-size:11px;font-weight:800;color:var(--orange);letter-spacing:.08em}
.chain-node .t{font-weight:700;font-size:14px;margin:3px 0 6px;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.chain-node .pct{font-size:12px;color:var(--sub)}
.chain-node .bar{height:5px;background:var(--line);border-radius:3px;margin-top:7px;overflow:hidden}
.chain-node .bar i{display:block;height:100%;background:var(--orange)}
.chain-node .open{margin-top:10px;width:100%;background:var(--navy);color:#fff;
  padding:7px 0;border-radius:8px;font-weight:700}
.chain-link{align-self:center;flex-shrink:0;padding:0 6px;color:var(--orange);font-weight:800;font-size:18px}
.chain-start{margin-left:8px;min-width:170px;border:2px dashed var(--blue);border-radius:12px;
  background:transparent;color:var(--blue);font-weight:700;font-size:14px;flex-shrink:0}
.chain-start:hover{background:#EAF2FB}
.chain-row{margin-bottom:6px}
.del-set{background:none;color:var(--sub);font-size:12px;text-decoration:underline;margin-top:6px}

/* roadmap */
.road{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:800px){.road{grid-template-columns:repeat(2,1fr)}}
.road .wk{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:#FBFCFE}
.road .wk h4{font-size:13px;font-weight:800;color:var(--navy2);margin-bottom:8px}
.chk{display:flex;gap:8px;align-items:flex-start;font-size:13px;margin:6px 0;cursor:pointer}
.chk input{margin-top:3px;accent-color:var(--orange);width:15px;height:15px;flex-shrink:0}
.chk input:checked+span{color:var(--sub);text-decoration:line-through}

/* ---------- project view ---------- */
.proj-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.proj-head .back{background:none;color:var(--blue);font-weight:700;font-size:14px}
.proj-head .badge{background:var(--navy);color:#fff;font-size:12px;font-weight:800;
  padding:4px 11px;border-radius:99px}
.proj-title{width:auto;flex:1;min-width:220px;font-weight:700;font-size:16px}
.steps{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.step-tab{flex:1;min-width:118px;text-align:left;background:var(--card);border:1.5px solid var(--line);
  border-radius:10px;padding:9px 12px;color:var(--ink)}
.step-tab .sn{font-size:10.5px;font-weight:800;color:var(--sub);letter-spacing:.08em}
.step-tab .st{font-size:13.5px;font-weight:700;display:block}
.step-tab.on{border-color:var(--orange);background:#FDF3EB}
.step-tab.on .sn{color:var(--orange)}
.step-tab.done .sn::after{content:" ✓";color:var(--ok)}

/* framework strip */
.fw{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
.fw span{background:var(--navy);color:#fff;font-size:12px;font-weight:700;
  padding:5px 11px;border-radius:7px}
.fw span b{color:var(--orange);margin-right:2px}

/* link directory */
.links{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:8px}
.links a{border:1px solid var(--line);border-radius:9px;padding:8px 11px;background:#fff;
  display:block;font-size:12.5px;line-height:1.45}
.links a:hover{border-color:var(--blue);background:#F4F8FD}
.links a b{display:block;color:var(--ink);font-size:13px}
details.dir{border:1px solid var(--line);border-radius:11px;background:#FBFCFE;
  padding:10px 14px;margin:12px 0}
details.dir summary{font-weight:700;font-size:13.5px;cursor:pointer;color:var(--navy2)}
details.dir .links{margin-top:10px}

/* esc cards */
.esc{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:8px 0 4px}
@media(max-width:700px){.esc{grid-template-columns:repeat(2,1fr)}}
.esc button{border:1.5px solid var(--line);border-radius:11px;background:#fff;
  padding:13px 10px;text-align:center}
.esc button .L{font-size:21px;font-weight:800;color:var(--navy2);display:block}
.esc button .d{font-size:12.5px;color:var(--sub)}
.esc button.on{border-color:var(--orange);background:#FDF3EB}
.esc button.on .L{color:var(--orange)}
.tipbox{background:#F0F4FA;border-left:3px solid var(--blue);border-radius:0 9px 9px 0;
  padding:10px 14px;font-size:13px;margin:10px 0;color:#33405C}
.cnt{font-weight:600;font-size:12px;color:var(--sub);margin-left:6px}
.dest{font-weight:700;font-size:11.5px;color:var(--orange);margin-left:6px;white-space:nowrap}
.cnt.ok{color:var(--ok)}.cnt.over{color:#C0392B}
.bodysec{border-left:3px solid var(--line);padding-left:14px;margin:10px 0 14px}
.bodysec label{margin-top:8px}
.refbar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin:8px 0 4px}
.refbar select{width:auto;min-width:150px}
.refbar input{width:150px}
.refbar .rf-wide{width:230px}
.stylewarn{background:#FDF0EF;border:1px solid #EFC5C0;border-radius:9px;padding:10px 14px;
  font-size:12.5px;color:#8E3B33;margin:10px 0}
.stylewarn b{background:#F6D9D5;padding:0 4px;border-radius:4px}
.coach{border:1.5px solid #C9D8EC;background:#F2F7FD;border-radius:11px;padding:12px 15px;margin:4px 0 16px}
.coach .ct{font-size:12px;font-weight:800;letter-spacing:.08em;color:var(--navy2);margin-bottom:8px}
.coach .ci{display:flex;gap:9px;align-items:flex-start;font-size:13px;margin:7px 0;line-height:1.55}
.coach .ci .tag{flex-shrink:0;font-size:11px;font-weight:800;color:#fff;background:var(--navy2);
  padding:2px 8px;border-radius:99px;margin-top:2px}
.coach .chip{display:inline-block;text-decoration:none;background:#fff;border:1.5px solid var(--blue);color:var(--blue);
  font-weight:700;font-size:12px;padding:2px 10px;border-radius:99px;margin:0 3px 3px 0}
.coach .chip:hover{background:var(--blue);color:#fff}
.coach a{font-weight:700}
.coach .act{background:none;color:var(--orange);font-weight:700;font-size:12.5px;padding:0;margin-left:6px}
.coach .sg{display:flex;gap:8px;align-items:flex-start;justify-content:space-between;
  background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin:6px 0}
.coach .sgt{font-size:13px;color:var(--ink);line-height:1.5;flex:1}
.coach .use2{flex-shrink:0;background:var(--orange);color:#fff;font-weight:700;font-size:12px;
  padding:6px 11px;border-radius:7px;white-space:nowrap;border:none;cursor:pointer}
.coach .use2:hover{filter:brightness(1.06)}
.coach .act:hover{text-decoration:underline}
.recgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
@media(max-width:700px){.recgrid{grid-template-columns:1fr}}
.rec{border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;background:#FBFCFE;display:flex;flex-direction:column}
.rec .tag{align-self:flex-start;font-size:11px;font-weight:800;letter-spacing:.06em;
  color:#fff;background:var(--navy2);padding:3px 9px;border-radius:99px;margin-bottom:7px}
.rec .rt{font-weight:700;font-size:14px;line-height:1.45;margin-bottom:4px}
.rec .rd{font-size:12.5px;color:var(--sub);flex:1}
.rec .use{margin-top:10px;align-self:flex-start;background:none;color:var(--orange);
  font-weight:700;font-size:13px;padding:0}
.rec .use:hover{text-decoration:underline}

/* setuk preview */
.setuk{font-family:var(--serif);background:#FFFDF6;border:1px solid #E4DCC4;border-radius:4px;
  padding:20px 22px;font-size:14.5px;line-height:1.9;color:#2B2418;
  box-shadow:0 1px 0 #E4DCC4, 0 4px 14px rgba(80,64,20,.07)}
.setuk .blank{color:#B0A48A}
.setuk-cap{font-size:12px;color:var(--sub);margin-top:8px}

/* footer buttons */
.btn{background:var(--orange);color:#fff;padding:10px 18px;border-radius:9px;font-weight:800;font-size:14px}
.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:#fff;color:var(--navy2);border:1.5px solid var(--line)}
.btn.navy{background:var(--navy)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.save-note{position:fixed;bottom:18px;right:18px;background:var(--navy);color:#fff;
  padding:8px 16px;border-radius:99px;font-size:12.5px;opacity:0;transition:opacity .3s;pointer-events:none}
.save-note.show{opacity:.92}
.mem-warn{background:#FFF4E8;border:1px solid #F2CBA5;border-radius:10px;padding:10px 14px;
  font-size:12.5px;color:#8A5A21;margin-bottom:14px;display:none}

@media print{
  header,.steps,.actions,.hbtn,.save-note,.mem-warn,.chain-start,details.dir,.step-tab{display:none!important}
  body{background:#fff}.card{border:none;padding:10px 0;margin:0 0 8px}
  .wrap{padding:0;max-width:none}
}
</style>
</head>
<body>
<header>
  <h1>탐구 <span>SET</span> 워크북</h1>
  <div class="sub">일상에서 시작하는 탐구 · 청주신흥고 2학년</div>
  <div class="spacer"></div>
  <button class="hbtn" onclick="goHome()">내 탐구</button>
  <button class="hbtn" onclick="exportJSON()">백업</button>
  <button class="hbtn" onclick="importJSON()">복원</button>
</header>

<div class="wrap">
  <div class="mem-warn" id="memWarn">이 환경에서는 저장이 유지되지 않습니다. 파일을 다운로드해 브라우저에서 직접 열면 자동 저장됩니다. 이용을 마칠 때 <b>백업</b> 버튼으로 기록을 내려받아 두세요.</div>
  <div id="app"></div>
</div>
<div class="save-note" id="saveNote">저장됨</div>
<input type="file" id="fileIn" accept=".json" style="display:none">

<script>
/* ================= storage (localStorage → memory fallback) ================= */
var memStore={}, canStore=false;
try{localStorage.setItem('__t','1');localStorage.removeItem('__t');canStore=true;}catch(e){}
function load(){ try{ if(canStore){var s=localStorage.getItem('tamguset');return s?JSON.parse(s):null;} }catch(e){} return memStore.data||null; }
function persist(){ try{ if(canStore){localStorage.setItem('tamguset',JSON.stringify(DB));} }catch(e){} memStore.data=DB;
  var n=document.getElementById('saveNote'); n.classList.add('show'); clearTimeout(persist._t); persist._t=setTimeout(function(){n.classList.remove('show');},900); }

var DB = load() || { projects:[], roadmap:{} };
var view = {page:'home', pid:null, step:1};
if(!canStore) document.addEventListener('DOMContentLoaded',function(){document.getElementById('memWarn').style.display='block';});

/* ================= config ================= */
var STEPS=[
 {n:'STEP 1',t:'질문'},{n:'STEP 2',t:'계획'},{n:'STEP 3',t:'실행 · RRRPP'},
 {n:'STEP 4',t:'심화 · ESC'},{n:'STEP 5',t:'마무리 · 연계'}];

var SOURCES=[
 ['KMOOC','대학 수준 강의 · 배경지식','https://www.kmooc.kr'],
 ['KOCW','대학 현강 시청 · 연구주제','https://www.kocw.net'],
 ['RISS','국내 대표 논문 검색','https://www.riss.kr'],
 ['ScienceON','과학기술 논문·동향 (KISTI)','https://scienceon.kisti.re.kr'],
 ['국회도서관','방대한 자료 무료 이용','https://www.nanet.go.kr'],
 ['구글 학술검색','학술논문·단행본·초록','https://scholar.google.com'],
 ['빅카인즈','국내 최대 뉴스 검색','https://www.bigkinds.or.kr'],
 ['국가통계포털 KOSIS','각종 통계자료','https://kosis.kr'],
 ['DBpia','학생들이 가장 많이 쓰는 논문검색','https://www.dbpia.co.kr'],
 ['한국은행 경제교육','금융정책·경제용어·영상','https://www.bok.or.kr'],
 ['뉴닉','최신 이슈 뉴스레터','https://newneek.co'],
 ['사이언스타임즈','과학기술 동향·정책','https://www.sciencetimes.co.kr'],
 ['메디컬타임즈','국내외 의료계 이슈','https://www.medicaltimes.com'],
 ['Think with Google','최신 트렌드·데이터','https://www.thinkwithgoogle.com'],
 ['네이버 전문정보','논문·통계·리포트·초록','https://academic.naver.com'],
 ['KDI 경제정보센터','국내외 경제정책 자료','https://eiec.kdi.re.kr'],
 ['우리금융경영연구소','경제·금융·ESG','https://www.wfri.re.kr'],
 ['생글생글','청소년 눈높이 경제·시사','https://sgsg.hankyung.com'],
 ['한국무역협회 KITA','경제·통상 보고서','https://www.kita.net'],
 ['오픈애즈','마케팅 인사이트·트렌드','https://www.openads.co.kr']];

var ROADMAP=[
 ['1주차 · 7월 넷째 주 — 로드맵 점검',['3개년 교육과정 편제표 다시 확인','희망 계열·전공 후보 2~3개 좁히기','2학기 수강신청 과목 최종 점검']],
 ['2주차 · 8월 첫째 주 — 호기심 수집',['일상 속 궁금증 10개 이상 메모','관심 학과 홈페이지·가이드북 조사','탐구 소재가 될 뉴스·책 스크랩']],
 ['3주차 · 8월 둘째 주 — 탐구 설계',['교과 개념과 연결되는 탐구주제 1개 확정','관련 독서 목록·RISS 논문 리스트업','탐구 방향(질문·방법) 한 문단으로 정리']],
 ['4주차 · 8월 셋째 주 — 실행 착수',['자료 조사·데이터 수집 시작','2학기 세특 연계 계획, 담임·교과교사와 상담','탐구 계획서 초안 작성']]];

var REP_GENERAL=[
 ['rep1','1. 서론 — 동기(독서·특강·수업) / 목적','→ Ⅰ.서론'],
 ['rep2','2. 이론적 배경 — 가설 / 교과 개념','→ Ⅱ.본론 소제목 1'],
 ['rep3','3. 연구방법 — 내용 / 분석','→ Ⅱ.본론 소제목 2'],
 ['rep4','4. 연구결과','→ Ⅱ.본론 소제목 3'],
 ['rep5','5. 결론 및 고찰 — 제안 (가장 중요!)','→ Ⅲ.결론'],
 ['rep6','6. 참고문헌','→ 참고문헌']];
var REP_EXP=[
 ['rep1','1. 실험 목적','→ Ⅰ.서론'],
 ['rep2','2. 실험 이론 및 원리','→ Ⅱ.본론 소제목 1'],
 ['rep3','3. 실험 기구 및 시약','→ Ⅱ.본론 소제목 2'],
 ['rep4','4. 실험 방법','→ Ⅱ.본론 소제목 2'],
 ['rep5','5. 주의 사항','→ Ⅱ.본론 소제목 2'],
 ['rep6','6. 실험 결과','→ Ⅱ.본론 소제목 3'],
 ['rep7','7. 토의 사항 — 시행착오 이유, 후속 과제','→ Ⅲ.결론'],
 ['rep8','8. 참고 자료','→ 참고문헌'],
 ['rep9','9. 참고 문헌','→ 참고문헌']];

var REF_TYPES={
 book:{name:'도서',f:['저자명','도서명','출판사','발행년도'],
  fmt:function(v){return v[0]+', <'+v[1]+'>, '+v[2]+', '+v[3];}},
 org:{name:'기관발행 도서·문서',f:['기관명','도서·문서명','발행년도'],
  fmt:function(v){return v[0]+', <'+v[1]+'>, '+v[2];}},
 paper:{name:'논문',f:['저자명','자료·논문명','기관명','발행년도'],
  fmt:function(v){return v[0]+', <'+v[1]+'>, '+v[2]+', '+v[3];}},
 news:{name:'기사',f:['기사제목','언론사명','기사날짜','기사주소(URL)','접속일'],

 web:{name:'인터넷 사이트',f:['게시물명·검색어','참고사이트명','게시일(없으면 생략)','사이트주소(URL)','접속일'],

/* ================= helpers ================= */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getP(id){for(var i=0;i<DB.projects.length;i++)if(DB.projects[i].id===id)return DB.projects[i];return null;}
function progress(p){var f=0;for(var i=0;i<PROG_FIELDS.length;i++)if((p[PROG_FIELDS[i]]||'').trim())f++;return Math.round(f/PROG_FIELDS.length*100);}
function chains(){ // group projects into chains by parent links
  var roots=[],byParent={};
  DB.projects.forEach(function(p){ if(p.parentId&&getP(p.parentId)){(byParent[p.parentId]=byParent[p.parentId]||[]).push(p);} else roots.push(p);});
  return roots.map(function(r){var arr=[r],cur=r;while(byParent[cur.id]&&byParent[cur.id].length){cur=byParent[cur.id][0];arr.push(cur);}return arr;});
}
function firstLine(s){return (s||'').split('\n')[0].trim();}

/* ================= render: home ================= */
function goHome(){view={page:'home',pid:null,step:1};render();}
function openP(id,step){view={page:'proj',pid:id,step:step||1};render();window.scrollTo(0,0);}
function newSet(parentId){
  var p={id:uid(),parentId:parentId||null,title:'',createdAt:Date.now()};
  if(parentId){var pa=getP(parentId); if(pa&&(pa.f_follow_q||'').trim()){p.q_question=pa.f_follow_q; p.q_obs='이전 탐구('+(pa.p_topic||pa.title||'탐구 '+'')+')에서 이어진 질문';}}
  DB.projects.push(p);persist();openP(p.id,1);
}
function delSet(id){
  if(!confirm('이 탐구 SET을 삭제할까요? 이어진 후속 탐구는 독립 탐구로 남습니다.'))return;
  DB.projects.forEach(function(p){if(p.parentId===id)p.parentId=null;});
  DB.projects=DB.projects.filter(function(p){return p.id!==id;});
  persist();render();
}

function stepDone(p,i){
  if(i===1)return (p.q_question||'').trim();
  if(i===2)return (p.p_topic||'').trim()&&(p.p_direction||'').trim();
  if(i===3)return (p.r_intro||'').trim()||(p.read_sum||'').trim();
  if(i===4)return p.esc_type;
  if(i===5)return (p.f_summary||'').trim();
  return false;
}

function chainIndex(p){var i=0,cur=p;while(cur.parentId&&getP(cur.parentId)){cur=getP(cur.parentId);i++;}return i;}

/* ---------- report: counters & style check ---------- */
function updateReportAids(){
  var p=getP(view.pid); if(!p||view.step!==3)return;
  var TH=(p.r_mode==='thesis');
  var body=((p.r_b1||'')+(p.r_b2||'')+(p.r_b3||''))+(TH?((p.r_b4||'')+(p.r_b5||'')):'');
  var pairs=[['cnt_abs',(p.r_abstract||'').length,null],
   ['cnt_intro',(p.r_intro||'').length,REPORT_TARGETS.intro],
   ['cnt_body',body.length,REPORT_TARGETS.body],
   ['cnt_concl',(p.r_concl||'').length,REPORT_TARGETS.concl]];
  pairs.forEach(function(a){var el=document.getElementById(a[0]);if(!el)return;
    if(TH||!a[2]){el.textContent=a[1]+'자';el.className='cnt';return;}
    el.textContent=a[1]+'자 / '+a[2]+'자 내외';
    el.className='cnt '+(a[1]>a[2]*1.25?'over':(a[1]>=a[2]*0.75?'ok':''));});
  var text=['r_abstract','r_intro','r_b1','r_b2','r_b3','r_b4','r_b5','r_concl'].map(function(k){return p[k]||'';}).join('\n');
  var found={};
  STYLE_BAD.forEach(function(re){var m=text.match(re);if(m)found[m[0].trim()]=(found[m[0].trim()]||0)+m.length;});
  var keys=Object.keys(found), box=document.getElementById('styleWarn'); if(!box)return;
  box.innerHTML=keys.length?'<div class="stylewarn">문체 점검 · 자신을 드러내는 표현이나 경어체가 보여요: '
    +keys.map(function(k){return '<b>'+esc(k)+'</b> '+found[k]+'회';}).join(', ')
    +' — "~하였다", "~로 나타났다"처럼 객관적 서술로 바꿔 보세요.</div>':'';
}

/* ---------- report: outline -> school form ---------- */
function assembleOutline(){
  var p=getP(view.pid), filled=[], skipped=[];
  function put(key,val,label){
    val=(val||'').trim(); if(!val)return;
    if((p[key]||'').trim()){skipped.push(label);return;}
    p[key]=val; filled.push(label);
  }
  function join(){var a=[];for(var i=0;i<arguments.length;i++){var v=(p[arguments[i]]||'').trim();if(v)a.push(v);}return a.join('\n');}
  if(p.rep_type==='exp'){
    put('r_intro',p.rep1,'Ⅰ.서론');
    put('r_b1t',(p.rep2||'').trim()?'1. 실험 이론 및 원리':'','본론 소제목1'); put('r_b1',p.rep2,'본론1');
    var m=join('rep3','rep4','rep5');
    put('r_b2t',m?'2. 실험 기구 및 방법':'','본론 소제목2'); put('r_b2',m,'본론2');
    put('r_b3t',(p.rep6||'').trim()?'3. 실험 결과':'','본론 소제목3'); put('r_b3',p.rep6,'본론3');
    put('r_concl',p.rep7,'Ⅲ.결론');
    put('r_refs',join('rep8','rep9'),'참고문헌');
  }else{
    put('r_intro',p.rep1,'Ⅰ.서론');
    put('r_b1t',(p.rep2||'').trim()?'1. 이론적 배경':'','본론 소제목1'); put('r_b1',p.rep2,'본론1');
    put('r_b2t',(p.rep3||'').trim()?'2. 연구 방법 및 분석':'','본론 소제목2'); put('r_b2',p.rep3,'본론2');
    put('r_b3t',(p.rep4||'').trim()?'3. 연구 결과':'','본론 소제목3'); put('r_b3',p.rep4,'본론3');
    put('r_concl',p.rep5,'Ⅲ.결론');
    put('r_refs',p.rep6,'참고문헌');
  }
  persist();render();
  var msg=filled.length?'초안을 채웠습니다: '+filled.filter(function(x){return !/소제목/.test(x);}).join(', '):'옮길 개요 내용이 없습니다. ①에서 개요를 먼저 작성해주세요.';
  if(skipped.length)msg+='\n이미 작성되어 건너뛴 항목: '+Array.from(new Set(skipped.filter(function(x){return !/소제목/.test(x);}))).join(', ');
  alert(msg);
}

/* ---------- report: reference builder ---------- */
function renderRefFields(){
  var sel=document.getElementById('refType'); if(!sel)return;
  if(!sel.options.length){for(var k in REF_TYPES){var o=document.createElement('option');o.value=k;o.textContent=REF_TYPES[k].name;sel.appendChild(o);}}
  var t=REF_TYPES[sel.value], span=document.getElementById('refFields');
  span.innerHTML=t.f.map(function(f,i){
    var wide=/URL|명/.test(f)&&i<2?' class="rf-wide"':'';
    return '<input type="text" id="rf'+i+'"'+wide+' placeholder="'+esc(f)+'">';}).join('');
}
function addRef(){
  var sel=document.getElementById('refType'), t=REF_TYPES[sel.value], vals=[], missing=false;
  t.f.forEach(function(f,i){var v=(document.getElementById('rf'+i).value||'').trim();
    if(!v&&!/생략/.test(f))missing=true; vals.push(v);});
  if(missing){alert('빈 칸을 채워주세요. (게시일처럼 "생략" 표시가 있는 항목만 비워도 됩니다)');return;}
  var p=getP(view.pid); p.r_refs=((p.r_refs||'').trim()?p.r_refs.replace(/\s+$/,'')+'\n':'')+t.fmt(vals);
  persist();render();
}

function bodyPairs(th){

function reportPlain(p){
  var L=[];
  L.push('주제: '+(p.p_topic||p.title||''));
  L.push('학교: 청주신흥고등학교   이름: '+(p.stu_name||'')+'   학번: '+(p.stu_num||''));
  var TH=(p.r_mode==='thesis');
  if(TH&&(p.r_abstract||'').trim()){L.push('');L.push('요약 (초록)');L.push(p.r_abstract);}
  L.push('');L.push('Ⅰ. 서론');L.push(p.r_intro||'');
  L.push('');L.push('Ⅱ. 본론');
  bodyPairs(TH).forEach(function(a){
    if((p[a[0]]||'').trim()||(p[a[1]]||'').trim()){L.push(p[a[0]]||'');L.push(p[a[1]]||'');L.push('');}});
  L.push(TH?'Ⅲ. 결론 및 제언':'Ⅲ. 결론 및 느낀 점');L.push(p.r_concl||'');
  L.push('');L.push('참고 문헌');L.push(p.r_refs||'');
  return L.join('\n');
}
function copyReport(){
  var p=getP(view.pid);
  var done=function(ok){alert(ok?'복사되었습니다. 한글 문서에 붙여넣으세요.':'복사에 실패했습니다. 본문을 직접 선택해 복사해주세요.');};
  try{navigator.clipboard.writeText(reportPlain(p)).then(function(){done(true);},function(){done(false);});}

function docPara(t,style){return '<p style="'+style+'">'+esc(t).replace(/\n/g,'<br>')+'</p>';}
function exportDoc(){

  var T='font-family:\'함초롬바탕\',Batang,serif;font-size:13pt;line-height:180%;font-weight:bold;text-align:center;margin:0 0 10pt';
  var html='<html><head><meta charset="utf-8"><title>심화주제탐구 보고서</title></head><body>'
   +docPara(p.p_topic||p.title||'(주제)',T)
   +docPara('청주신흥고등학교   '+(p.stu_num||'학번')+'   '+(p.stu_name||'이름'),B+';text-align:center')
   +((p.r_mode==='thesis')&&(p.r_abstract||'').trim()?docPara('요약 (초록)',H)+docPara(p.r_abstract,B):'')
   +docPara('Ⅰ. 서론',H)+docPara(p.r_intro||'',B)
   +docPara('Ⅱ. 본론',H);
  bodyPairs(p.r_mode==='thesis').forEach(function(a){
    if((p[a[0]]||'').trim()||(p[a[1]]||'').trim())
      html+=docPara(p[a[0]]||'',H)+docPara(p[a[1]]||'',B);});
  html+=docPara(p.r_mode==='thesis'?'Ⅲ. 결론 및 제언':'Ⅲ. 결론 및 느낀 점',H)+docPara(p.r_concl||'',B)
   +docPara('참고 문헌',H)+docPara(p.r_refs||'',B)
   +'</body></html>';
  var blob=new Blob(['\ufeff'+html],{type:'application/msword'});

function draftAbstract(){var p=getP(view.pid);

function setukText(p){
  function v(x,ph){x=(x||'').trim();return x?'<b>'+esc(x)+'</b>':'<span class="blank">'+ph+'</span>';}
  function raneun(x){x=(x||'').trim();if(!x)return '라는';
    var c=x.charCodeAt(x.length-1);
    return (c>=0xAC00&&c<=0xD7A3&&(c-0xAC00)%28>0)?'이라는':'라는';}
  var book=firstLine(p.p_books).split('/')[0].trim();
  var acts=[];if((p.r_intro||'').trim()||(p.r_concl||'').trim())acts.push('보고서 작성');
  if(p.chk_present)acts.push('발표');if(p.chk_post)acts.push('게시·공유');

  var actTxt=acts.length?'<b>'+acts.join(', ')+'</b>':'<span class="blank">보고서 작성/발표/공유/캠페인</span>';
  return v(p.f_related||p.p_subjects,'교과 내용/이전 활동')+'에서 '
   +v(p.p_topic,'탐구 주제')+raneun(p.p_topic)+' 주제를 선정하고, '
   +v(book,'연결 독서')+'의 내용을 바탕으로 관련 자료를 조사하여 '
   +v(firstLine(p.f_conclusion),'핵심 결론·제안')+'을(를) 도출함. '
   +actTxt+'을(를) 진행하고 '
   +v(firstLine(p.f_follow_q||p.f_follow),'후속 질문·활동')+'(으)로 탐구를 확장함.';
}

function qType(base){for(var i=0;i<Q_TYPES.length;i++)if(Q_TYPES[i][0].test(base))return i;return -1;}

function topicSuggestions(p){
  var kws=extractKeywords(p); if(!kws.length)return [];
  var k1=kws[0], k2=kws[1]||'', base=[p.q_question,p.q_obs,p.q_context].join(' ');
  var t=qType(base), out=[];
  if(t===0) out.push(k1+(k2?josa(k1,'과','와')+' '+k2:'')+'의 차이 비교 분석');
  else if(t===1) out.push(k1+josa(k1,'이','가')+' '+(k2||'결과')+'에 미치는 영향 분석');
  else if(t===2) out.push(k1+'의 정량적 측정과 분석');
  else if(t===3) out.push(k1+'의 원리와 과정 탐구');
  else if(t===4) out.push(k1+(k2?josa(k1,'과','와')+' '+k2+'의':'의')+' 관계와 원인 분석');
  out.push(k1+(k2?josa(k1,'과','와')+' '+k2+'의 관계':'의 사례')+' 탐구');
  out.push(k1+'에 대한 '+(matchSubjects(base)[0]||'교과')+' 관점의 분석');
  // 중복 제거
  var seen={},uniq=[]; out.forEach(function(x){if(!seen[x]){seen[x]=1;uniq.push(x);}});
  return uniq.slice(0,3);
}
function directionSuggestions(p){
  var kws=extractKeywords(p); if(!kws.length)return [];
  var k1=kws[0], k2=kws[1]||'대상', base=[p.q_question,p.q_obs,p.q_context].join(' ');
  var eul=josa(k1,'을','를'), t=qType(base), out=[];
  if(t===0) out.push(k1+josa(k1,'과','와')+' '+k2+josa(k2,'을','를')+' 같은 조건에서 비교표로 정리 → 항목별 차이를 분석 → 차이가 생기는 이유를 교과 개념으로 설명한다.');
  else if(t===1) out.push(k1+eul+' 단계별로 바꿔가며 '+k2+'의 변화를 측정 → 데이터를 그래프로 정리 → 상관관계를 분석한다.');
  else if(t===2) out.push(k1+eul+' 동일 조건에서 여러 번 측정 → 평균과 오차를 계산 → 수치로 결론을 도출한다.');
  else if(t===3) out.push(k1+'의 과정을 단계로 나누어 관찰·기록 → 각 단계의 핵심을 정리 → 개선 방안을 제안한다.');
  else if(t===4) out.push((k2?k1+josa(k1,'이','가')+' '+k2+'에 영향을 준다는':k1+'의 원인에 대한')+' 가설을 세움 → 자료·실험으로 확인 → 가설을 검증하고 결론을 정리한다.');
  else out.push(k1+'에 대해 자료를 조사 → 핵심 쟁점을 정리 → 나의 관점으로 결론을 도출한다.');
  out.push('관련 논문·도서를 읽고 배경을 정리 → '+k1+eul+' 직접 조사·분석 → 결과를 보고서로 정리한다.');
  return out.slice(0,2);
}
function coachStep2(p){
  var base=[p.q_question,p.q_obs,p.q_context,p.p_topic].join(' ');
  if(!base.trim())return [];
  var items=[];
  var t=qType(base);
  if(t>=0)items.push({tag:Q_TYPES[t][1],html:esc(Q_TYPES[t][2])});
  else items.push({tag:'가설 검증형',html:'예상 답(가설)을 한 문장으로 먼저 적고, 그것을 확인할 방법을 설계해 보세요.'});
  var subs=matchSubjects(base).filter(function(x){return (p.p_subjects||'').indexOf(x)<0;});
  if(subs.length)items.push({tag:'연계 교과',html:'질문의 키워드와 맞닿은 교과예요. 눌러서 추가: '
    +subs.map(function(x){return '<button class="chip" onclick="addSubject(\''+x+'\')">'+esc(x)+' +</button>';}).join('')});
  var ts=topicSuggestions(p);

  var ds=directionSuggestions(p);
  if(ds.length&&!(p.p_direction||'').trim())items.push({tag:'탐구 방향 · 골라 넣기',html:'"무엇을 → 어떻게 → 어디까지"를 문장으로 만들었어요:'+suggestBtns('p_direction',ds)});
  return items;
}
function coachStep3(p){
  var items=[];

      +(p.rep_type!=='exp'?'<button class="act" onclick="setRepExp()">보고서 개요를 실험 9단계로 전환</button>':'')});
  }else if(/설문|인식|응답|의견/.test(d)){
    items.push({tag:'조사 방법',html:'설문이 보여요. 문항 설계 → 대상·표본 확정 → 빈도분석·교차분석 순서로. 그래프 해석 문장을 꼭 남기세요.'});
  }else if(/비교|사례|정책/.test(d)){
    items.push({tag:'조사 방법',html:'비교·사례 탐구가 보여요. 비교 기준표(항목 × 대상)를 먼저 만들고 칸을 채우듯 조사하세요.'});
  }else if(d.trim()){
    items.push({tag:'조사 방법',html:'논문은 초록 3편부터. 각 초록에서 "합의된 것 / 다투는 것"을 한 줄씩 정리하면 본론 뼈대가 됩니다.'});
  }
  if((p.read_more||'').trim())items.push({tag:'독서 연계',html:'"더 알고 싶은 내용"에 적은 것이 다음 조사 주제입니다: '+esc(firstLine(p.read_more))});
  return items;
}
function coachStep4(p){
  var text=[p.p_direction,p.r_b1,p.r_b2,p.r_b3,p.res_scraps].join(' ');
  if(!text.trim())return [];
  var score={exp:0,survey:0,campaign:0};
  (text.match(/측정|실험|변인|온도|장치|재료|반복/g)||[]).forEach(function(){score.exp++;});
  (text.match(/설문|인식|세대|응답|선호|행동|의견/g)||[]).forEach(function(){score.survey++;});
  (text.match(/캠페인|개선|정책|제안|실천|참여|홍보|문제/g)||[]).forEach(function(){score.campaign++;});
  var order=['exp','survey','campaign'].sort(function(a,b){return score[b]-score[a];});
  if(!score[order[0]])return [];
  var name={exp:'실험(E)',survey:'설문조사(S)',campaign:'캠페인(C)'};
  var why={exp:'탐구 기록에 측정·변인 같은 실험의 언어가 보입니다',
   survey:'인식·행동을 다루고 있어 설문으로 근거를 만들기 좋습니다',
   campaign:'문제 해결·제안의 흐름이라 실천으로 완성하기 좋습니다'};
  var items=[{tag:'추천 유형',html:'<b>'+name[order[0]]+'</b> — '+why[order[0]]+'.'
    +(score[order[1]]?' 차선: '+name[order[1]]+'.':'')}];
  if(p.esc_type&&p.esc_type!=='none'&&p.esc_type!==order[0]){
    var a=name[p.esc_type].replace(/\(.\)$/,''), b=name[order[0]].replace(/\(.\)$/,'');
    items.push({tag:'참고',html:'이미 '+name[p.esc_type]+josa(a,'을','를')+' 선택했네요. '+name[order[0]]+josa(b,'은','는')+' 다음 탐구의 심화 유형으로 남겨도 좋습니다.'});}
  return items;
}
function coachStep5(p){
  var items=[];
  var out=[], subs=(p.p_subjects||'');
  if(p.esc_type==='survey')out.push('인포그래픽(그래프 중심)');
  if(p.esc_type==='exp')out.push('학술포스터(사진·도표 필수)');
  if(p.esc_type==='campaign')out.push('카드뉴스·실천 체크리스트');
  if(/경제|사회|법|지리/.test(subs))out.push('정책 제안서');
  if(!out.length)out.push('학술포스터(인포그래픽·도표 포함)');
  items.push({tag:'산출물',html:'이번 탐구와 잘 맞는 형태: <b>'+esc(out.slice(0,2).join(', '))+'</b>. 보고서에는 요약초록을 함께 붙이세요.'});
  items.push({tag:'공유',html:'교내 탐구 게시판·학급 공유방에 게시하고, 발표는 5분 · [사진/도표]+[키워드]로. 자신이 한 활동을 남이 알게 하세요.'});
  return items;
}

/* ---------- next-inquiry recommender ---------- */
function josa(w,a,b){ // a: 받침용(을/은/과/으로), b: 무받침용(를/는/와/로)
  w=(w||'').trim(); if(!w)return b;
  var c=w.charCodeAt(w.length-1);
  if(c<0xAC00||c>0xD7A3)return b;
  var jong=(c-0xAC00)%28;
  if(a==='으로'&&jong===8)return b; // ㄹ 받침은 '로'
  return jong>0?a:b;
}
var KW_STOP={'탐구':1,'연구':1,'분석':1,'결과':1,'내용':1,'조사':1,'확인':1,'과정':1,'활동':1,'보고서':1,
 '어떻게':1,'무엇':1,'무엇을':1,'다를까':1,'다른':1,'다름':1,'같을까':1,'까닭':1,'얼마나':1,'어떤':1,'어느':1,'과연':1,'정말':1,'우리':1,'사람':1,'경우':1,
 '현상':1,'방안':1,'방법':1,'문제':1,'차이':1,'관계':1,'영향':1,'요인':1,'중요':1,'필요':1,'변화':1,'효과':1,'특징':1,'상관':1,
 '통해':1,'대한':1,'대해':1,'관련':1,'경우':1,'때문':1,'하다':1,'있다':1,'없다':1,'된다':1,'한다':1,
 '그리고':1,'하지만':1,'또한':1,'따라서':1,'것으로':1,'이를':1,'있는':1,'하는':1,'되는':1,'같은':1,'다른':1};
var JOSA=/(에서는|으로써|으로서|에서|에게|한테|보다|처럼|까지|부터|으로|이며|이고|하고|과의|와의|들의|들은|들이|들을|에는|에도|의|을|를|이|가|은|는|와|과|도|만|로|에|다|고|며)$/;
function extractKeywords(p){
  var text=[p.p_topic,p.q_question,p.r_concl,p.read_more,p.f_conclusion].join(' ');
  var freq={};
  text.split(/[\s,.·()\[\]<>"'!?:;/]+/).forEach(function(w){
    w=w.trim(); if(w.length<2)return;
    // 서술어 활용형 제외: ~까/~다/~네/~요/~함/~됨/~ㄴ가 등으로 끝나는 의문·서술형
    if(/(을까|ㄹ까|할까|될까|들까|일까|는가|은가|인가|나요|까요|해요|이다|한다|된다|였다|겠다|는다|되다|하다|되며|되어|되는|되고|음|함|됨)$/.test(w))return;
    var base=w.replace(JOSA,'');
    if(base.length<2||KW_STOP[base]||/^[0-9]+$/.test(base))return;
    // 주제/질문에 나온 것 가중, 두 글자 이상 명사형 우대
    freq[base]=(freq[base]||0)+1+(p.p_topic&&p.p_topic.indexOf(base)>=0?2:0);
  });
  return Object.keys(freq).sort(function(a,b){return freq[b]-freq[a];}).slice(0,4);
}
var SUBJECT_POOL=['수학','물리학','화학','생명과학','지구과학','사회문화','경제','정치와 법','윤리','한국지리','역사','정보','언어와 매체','영어'];
function unusedSubject(p){
  var used=(p.p_subjects||'');
  for(var i=0;i<SUBJECT_POOL.length;i++)if(used.indexOf(SUBJECT_POOL[i])<0)return SUBJECT_POOL[i];
  return '다른 교과';
}
function recCards(p){
  var kws=extractKeywords(p);
  if(!kws.length)return [];
  var k1=kws[0], k2=kws[1]||kws[0], sub=unusedSubject(p);
  var conclHead=firstLine(p.r_concl||p.f_conclusion).slice(0,40);
  var escLeft=['exp','survey','campaign'].filter(function(t){return t!==p.esc_type;});
  var escName={exp:'실험',survey:'설문조사',campaign:'캠페인'};
  var escPick=escName[escLeft[0]]||'실천 활동';
  var recs=[
   {tag:'심화',title:"'"+k1+"'"+josa(k1,'을','를')+' 정량으로 검증하기',
    desc:'이번 탐구의 핵심 개념을 측정·통계·데이터로 수치화해 결론의 근거를 강화합니다.',
    q:k1+josa(k1,'을','를')+' 어떤 데이터로 측정하면 이번 결론을 정량적으로 검증할 수 있을까?'},
   {tag:'확장 · 교과 융합',title:"'"+k1+"' × "+sub+'의 관점',
    desc:'아직 연계하지 않은 교과('+sub+')의 개념으로 같은 현상을 다시 봅니다. 2개 이상 교과 연계는 융합 탐구의 조건!',
    q:sub+'의 관점에서 보면 '+k1+josa(k1,'은','는')+' 어떻게 다르게 설명될까?'},
   {tag:'분화 · 좁히기',title:"'"+k2+"'만 떼어 독립 탐구로",
    desc:'본론에서 한 문단이었던 부분을 새 탐구의 주제로 승격시킵니다. 좁을수록 깊어집니다.',
    q:k2+'에 한정하면 어떤 새로운 질문이 가능할까?'},
   {tag:'실천 · '+escPick,title:"'"+k1+"' 문제를 "+escPick+'으로',
    desc:'아직 해보지 않은 유형('+escPick+')으로 탐구를 행동으로 옮깁니다. 알아봤다 → 바꾸려고 했다.',
    q:k1+' 문제를 학교·지역에서 '+escPick+josa(escPick,'으로','로')+' 다루려면 무엇부터 해야 할까?'},
   {tag:'반론 · 한계',title:'결론의 반대 근거 찾기',
    desc:(conclHead?"'"+conclHead+"…'":'이번 결론')+'에 대한 예외 사례나 반박 자료를 탐색합니다. 제한점이 다음 탐구의 출발점.',
    q:'이번 결론이 성립하지 않는 조건이나 반례는 무엇일까?'},
   {tag:'문헌 · 선행연구',title:"'"+k1+"' 논문 초록 3편 비교",
    desc:'RISS·DBpia에서 관련 논문 초록만 3편 읽고 쟁점을 정리합니다. 초록만 봐도 충분합니다.',
    q:k1+' 연구에서 학자들이 아직 합의하지 못한 쟁점은 무엇일까?'}
  ];
  return recs;
}
function useRec(i){
  var p=getP(view.pid), r=(window._recs||[])[i]; if(!r)return;
  p.f_follow_q=r.q; persist(); render();
}
function copyAIPrompt(){
  var p=getP(view.pid);
  var t='고등학교 2학년 학생의 탐구 보고서 요약입니다. 이 학생의 다음 탐구 방향 5가지를 추천해 주세요.\n'
   +'각 방향은 [키워드] + 한 문장 설명 + 예시 탐구 질문 1개 형식으로, 고등학교에서 실행 가능한 수준으로, 연계할 교과를 명시해서 제안해 주세요. 이전 탐구와의 연결고리도 한 줄씩 써 주세요.\n\n'
   +'[주제] '+(p.p_topic||'')+'\n[탐구 질문] '+(p.q_question||'')+'\n[연계 교과] '+(p.p_subjects||'')
   +'\n[탐구 방향] '+(p.p_direction||'')+'\n[결론 요약] '+firstLine(p.r_concl||p.f_conclusion)
   +'\n[읽은 책] '+(p.p_books||'').replace(/\n/g,', ');

  try{navigator.clipboard.writeText(t).then(function(){done(true);},function(){done(false);});}catch(e){done(false);}
}

/* ================= events / autosave ================= */
document.addEventListener('click',function(e){
  var b=e.target.closest?e.target.closest('[data-fill-key]'):null;
  if(!b)return;
  fillField(b.getAttribute('data-fill-key'), b.getAttribute('data-fill-val'));
});
document.addEventListener('input',function(e){
  var k=e.target.getAttribute('data-k'); if(!k)return;
  var p=(view.page==='proj')?getP(view.pid):null; if(!p)return;
  if(e.target.type==='checkbox')p[k]=e.target.checked; else p[k]=e.target.value;
  if(k.charAt(0)==='r'&&k.charAt(1)==='_')updateReportAids();
  clearTimeout(window._sv); window._sv=setTimeout(persist,400);
});
document.addEventListener('change',function(e){
  var k=e.target.getAttribute('data-k'); if(!k)return;
  var p=(view.page==='proj')?getP(view.pid):null; if(!p)return;
  if(e.target.tagName==='SELECT'){p[k]=e.target.value;persist();render();}
  if(e.target.type==='checkbox'){p[k]=e.target.checked;persist();}
});

/* ================= backup ================= */
function exportJSON(){
  var blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='탐구SET_백업_'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importJSON(){document.getElementById('fileIn').click();}
document.getElementById('fileIn').addEventListener('change',function(e){
  var f=e.target.files[0];if(!f)return;var r=new FileReader();
  r.onload=function(){try{var d=JSON.parse(r.result);
    if(!d.projects)throw 0; DB=d; persist(); goHome();}
    catch(err){alert('백업 파일을 읽지 못했습니다. 탐구 SET 워크북에서 내려받은 JSON 파일인지 확인해주세요.');}};
  r.readAsText(f); e.target.value='';});

/* ================= main ================= */
function render(){
  document.getElementById('app').innerHTML=(view.page==='home')?renderHome():renderProj();
  if(view.page==='proj'&&view.step===3){renderRefFields();updateReportAids();}
}
render();
